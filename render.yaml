services:
  # Production web service
  - type: web
    name: jee-growth-tracker
    env: static
    buildCommand: "npm run build"
    staticPublishPath: ./public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: "geolocation=(), microphone=(), camera=()"
    envVars:
      - key: NODE_ENV
        value: production
      - key: FIREBASE_API_KEY
        value: AIzaSyDrORq3mZHx1tf5qbH-fdt0ScysupK10e0
      - key: FIREBASE_AUTH_DOMAIN
        value: gorwth.firebaseapp.com
      - key: FIREBASE_PROJECT_ID
        value: gorwth
      - key: FIREBASE_STORAGE_BUCKET
        value: gorwth.firebasestorage.app
      - key: FIREBASE_MESSAGING_SENDER_ID
        value: 36209213488
      - key: FIREBASE_APP_ID
        value: 1:36209213488:web:a0441fe55e2c771aaaedf5
      - key: FIREBASE_MEASUREMENT_ID
        value: G-ZE7SY6VLVD

version: "1"
