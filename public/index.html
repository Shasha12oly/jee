<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading - JEE Growth Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .loading-container {
            text-align: center;
            z-index: 10;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: float 3s ease-in-out infinite;
        }

        .logo-text {
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .spinner {
            width: 60px;
            height: 60px;
            margin: 0 auto 2rem;
            position: relative;
        }

        .spinner-circle {
            width: 100%;
            height: 100%;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: white;
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            animation: pulse 2s ease-in-out infinite;
        }

        .loading-subtext {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.875rem;
            animation: pulse 2s ease-in-out infinite 0.5s;
        }

        .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: 2rem auto 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 2px;
            animation: progress 2s linear forwards;
        }

        /* Animated background elements */
        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float-up 15s linear infinite;
        }

        .shape:nth-child(1) {
            width: 80px;
            height: 80px;
            left: 10%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 60px;
            height: 60px;
            left: 20%;
            animation-delay: 2s;
        }

        .shape:nth-child(3) {
            width: 100px;
            height: 100px;
            left: 35%;
            animation-delay: 4s;
        }

        .shape:nth-child(4) {
            width: 40px;
            height: 40px;
            left: 50%;
            animation-delay: 6s;
        }

        .shape:nth-child(5) {
            width: 70px;
            height: 70px;
            left: 70%;
            animation-delay: 8s;
        }

        .shape:nth-child(6) {
            width: 90px;
            height: 90px;
            left: 85%;
            animation-delay: 10s;
        }

        /* Animations */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes float-up {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Responsive design */
        @media (max-width: 640px) {
            .logo {
                width: 60px;
                height: 60px;
            }
            
            .logo-text {
                font-size: 1.2rem;
            }
            
            .spinner {
                width: 50px;
                height: 50px;
            }
            
            .loading-text {
                font-size: 1.1rem;
            }
            
            .progress-bar {
                width: 150px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background -->
    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <!-- Loading content -->
    <div class="loading-container">
        <div class="logo">
            <span class="logo-text">JEE</span>
        </div>
        
        <div class="spinner">
            <div class="spinner-circle"></div>
        </div>
        
        <h1 class="loading-text">Loading JEE Growth Tracker</h1>
        <p class="loading-subtext">Preparing your study dashboard...</p>
        
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>

    <script>
        // Redirect to home page after 2 seconds
        setTimeout(() => {
            window.location.href = '/home.html';
        }, 2000);

        // Add some dynamic loading messages
        const messages = [
            'Preparing your study dashboard...',
            'Loading your progress data...',
            'Setting up your reminders...',
            'Almost ready...'
        ];

        let messageIndex = 0;
        const subtextElement = document.querySelector('.loading-subtext');

        // Change messages every 1.25 seconds (5 seconds / 4 messages)
        setInterval(() => {
            messageIndex = (messageIndex + 1) % messages.length;
            if (subtextElement) {
                subtextElement.textContent = messages[messageIndex];
            }
        }, 1250);
    </script>
</body>
</html>
